plugins {
    id 'java'
}

group = 'com.contextsec'
version = '1.0.0'
sourceCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'net.portswigger.burp.extensions:montoya-api:2024.11'
    implementation 'com.google.code.gson:gson:2.10.1'
}

jar {
    archiveFileName = 'ClaudeTab.jar'
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
    manifest {
        attributes 'Implementation-Title': 'ClaudeTab', 'Implementation-Version': version
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
